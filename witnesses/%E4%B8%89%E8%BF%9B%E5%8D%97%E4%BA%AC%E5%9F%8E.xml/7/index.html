            <p class="tei-p tei-p1">第八天<span class="tei-time tei-time1">下午</span>，<pb-popover class="alternate tei-orgName tei-orgName9 orgName context" id="altref_1"><span slot="default">公安局</span><template slot="alternate">
            <span class="tei-orgName tei-orgName7">公安局</span>
        </template></pb-popover>报告了<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_2"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>说：“<pb-popover class="alternate tei-orgName tei-orgName9 orgName context" id="altref_3"><span slot="default">交通民警中队</span><template slot="alternate">
            <span class="tei-orgName tei-orgName7">交通民警中队</span>
        </template></pb-popover>三区来电话，嘎斯69—246号<pb-popover class="alternate tei-choice tei-choice3" id="altref_4"><span slot="default"><span class="tei-reg tei-reg1">车</span></span><template slot="alternate"><span class="tei-orig tei-orig1">車</span></template></pb-popover>已回<pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_5"><span slot="default">南京</span><template slot="alternate"><p class="tei-place tei-place5" id="P0001"/><ul class="tei-place tei-place6 links" id="P0001"/></template></pb-popover>，正在三区大街上行驶。”<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_6"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>听罢，立即调出公安局的小罗当他的助手，开着公安局的吉普車跟踪追击嘎斯69—246号車，不上十分钟就遇上了，两車一前一后，始终保持着之间半里路的距离，嘎斯車开上小路，吉普車也跟上小路，嘎斯車进入中山陵的树林内后，一转弯不<pb-popover class="alternate tei-choice tei-choice3" id="altref_7"><span slot="default"><span class="tei-reg tei-reg1">见</span></span><template slot="alternate"><span class="tei-orig tei-orig1">見</span></template></pb-popover>了，这<pb-popover class="alternate tei-choice tei-choice3" id="altref_8"><span slot="default"><span class="tei-reg tei-reg1">时</span></span><template slot="alternate"><span class="tei-orig tei-orig1">時</span></template></pb-popover>天渐渐地黑了，<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_9"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>和小罗把車开进树林里隐<pb-popover class="alternate tei-choice tei-choice1" id="altref_10"><span slot="default"><span class="tei-corr tei-corr1">蔽</span></span><template slot="alternate"><span class="tei-sic tei-sic1">敝</span></template></pb-popover>起来，两人把无声手枪装上了子弹，搜索了一番，发<pb-popover class="alternate tei-choice tei-choice3" id="altref_11"><span slot="default"><span class="tei-reg tei-reg1">现</span></span><template slot="alternate"><span class="tei-orig tei-orig1">現</span></template></pb-popover>距百米外有灯光发亮，走进一看，树林中一个小山有两幢三层楼，周围有两丈高的围墙，上面装有电网，<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_12"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>穿好绝缘外衣，爬上墙边的一棵树，往内一望，見内有一个相当大的运动场，场上停放着一辆嘎斯車及二辆小卧車，旁边葡萄架下有四、五个<pb-popover class="alternate tei-choice tei-choice3" id="altref_13"><span slot="default"><span class="tei-reg tei-reg1">军</span></span><template slot="alternate"><span class="tei-orig tei-orig1">軍</span></template></pb-popover>人在休息谈天。<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_14"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>这時估计，此地就是五七一信箱所属軍区机关，想罢，他纵身一跳，跃上电网，轻轻地下到花园，躲在暗处，注意着楼下亮着灯光似办公室的房间，办公室内，一张绿色的沙发上坐着一位穿军装的女青年，看样子不过20岁左右，桌上台灯柔和的光线映在她那白净的，机灵的脸上，柳条的细眉，粉红的嘴唇，更显得格外漂亮，她好象还在看一份打印的材料，不時在上面打着，划着，突然外面有人喊声：“报告”，但她头也不回，也不抬头，只是随口应声“进来”。门开进，走来一个軍人，立正报告道：“报告一号首长，他死了。”但她照样头也不抬。这時门又开了，走进来的还是一个軍人大汉，在她面前<pb-popover class="alternate tei-choice tei-choice1" id="altref_15"><span slot="default"><span class="tei-corr tei-corr1">笔</span></span><template slot="alternate"><span class="tei-sic tei-sic1">毕</span></template></pb-popover>直地立正敬礼，在这時，<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_16"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>发現在軍人的手腕上，有个黑痣，不觉想起从<pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_17"><span slot="default">云南</span><template slot="alternate"><p class="tei-place tei-place5" id="P0009"/><ul class="tei-place tei-place6 links" id="P0009"/></template></pb-popover>到<pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_18"><span slot="default">北京</span><template slot="alternate"><p class="tei-place tei-place5" id="P0011"/><ul class="tei-place tei-place6 links" id="P0011"/></template></pb-popover>，从<pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_19"><span slot="default">呼和浩特</span><template slot="alternate"><p class="tei-place tei-place5" id="P0015"/><ul class="tei-place tei-place6 links" id="P0015"/></template></pb-popover>到<pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_20"><span slot="default">南京</span><template slot="alternate"><p class="tei-place tei-place5" id="P0001"/><ul class="tei-place tei-place6 links" id="P0001"/></template></pb-popover>，在車上遇見的那个人不正是他<pb-popover class="alternate tei-choice tei-choice3" id="altref_21"><span slot="default"><span class="tei-reg tei-reg1">吗</span></span><template slot="alternate"><span class="tei-orig tei-orig1">嗎</span></template></pb-popover>？这正是第三次見到他的面了，想到这里，只听到那人说道：“没办法。”那年<pb-popover class="alternate tei-choice tei-choice1" id="altref_22"><span slot="default"><span class="tei-corr tei-corr1">轻</span></span><template slot="alternate"><span class="tei-sic tei-sic1">青</span></template></pb-popover>女的说：“给他讲清楚，只要说出来，保证他的安全，也照样给他当干部，”声音洪亮而严<pb-popover class="alternate tei-choice tei-choice1" id="altref_23"><span slot="default"><span class="tei-corr tei-corr1">厉</span></span><template slot="alternate"><span class="tei-sic tei-sic1">历</span></template></pb-popover>。“报告，软硬办法都用尽了，不行。”女的又说：“给我带进来，我不信他是钢铸的。”女人生气得叫了起来。“是，”两个軍人同時敬礼后转身走了出去，一会儿一个遍体鲜血，头发乱蓬蓬的人被拖了进来，那女人立即对他感劝道：“还是老老实实吧，落在我们手中，是要识時务的。”被拖进来的人猛地抬起头来，严威地大声骂道：“胡说，你们是群法西斯特务，人民最终将消灭你们。”他停了一会，两只眼睛闪耀着愤怒的眼光指道：“法西斯们，你们张开狗耳
                    </p></div></div></div></main><nav class="after-top"><ul><li><a class="aside-toggle" title="Hide" data-toggle=".after"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-bar-left" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M12.5 15a.5.5 0 0 1-.5-.5v-13a.5.5 0 0 1 1 0v13a.5.5 0 0 1-.5.5M10 8a.5.5 0 0 1-.5.5H3.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L3.707 7.5H9.5a.5.5 0 0 1 .5.5"/></svg></a></li></ul></nav><aside class="after"><div class="tab-panel"><span class="tab-title" data-title="Register">Register</span><div class="register-panel"><div class="register" id="exist-1.9.5.28"><h3>People</h3><ul><li class="tei-person tei-person2" id="PE0005"><a href="/shouchaoben/people/PE0005" class="persName"><pb-popover><span slot="default">余飞</span><template slot="alternate"/></pb-popover></a></li></ul><h3>Places</h3><ul><li class="tei-place tei-place2" id="P0001"><pb-geolocation event="mouseover" longitude="118.77778" latitude="32.06167" label="南京 Nanjing" auto="auto" wait-for="pb-leaflet-map" zoom="11" emit="map"><a href="/shouchaoben/places/P0001" class="placeName context"><pb-popover><span slot="default">南京</span><template slot="alternate"/></pb-popover></a><a href="/shouchaoben/places/P0001" class="placeName context"><pb-popover><span slot="default">Nanjing</span><template slot="alternate"/></pb-popover></a></pb-geolocation></li><li class="tei-place tei-place2" id="P0009"><pb-geolocation event="mouseover" longitude="" latitude="" label="云南" auto="auto" wait-for="pb-leaflet-map" zoom="11" emit="map"><a href="/shouchaoben/places/P0009" class="placeName context"><pb-popover><span slot="default">云南</span><template slot="alternate"/></pb-popover></a></pb-geolocation></li><li class="tei-place tei-place2" id="P0011"><pb-geolocation event="mouseover" longitude="" latitude="" label="" auto="auto" wait-for="pb-leaflet-map" zoom="11" emit="map"/></li><li class="tei-pla
