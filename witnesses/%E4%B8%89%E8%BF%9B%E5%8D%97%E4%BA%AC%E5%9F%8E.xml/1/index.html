a></li></ul></nav></aside></div></li></ul></nav></div></header><nav class="before-top"><ul/><ul><li><a class="aside-toggle" title="Hide" data-toggle=".before"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-bar-left" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M12.5 15a.5.5 0 0 1-.5-.5v-13a.5.5 0 0 1 1 0v13a.5.5 0 0 1-.5.5M10 8a.5.5 0 0 1-.5.5H3.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L3.707 7.5H9.5a.5.5 0 0 1 .5.5"/></svg></a></li></ul></nav><aside class="before"/><header class="content-top"><nav class="toolbar"><ul/><ul><li><span role="group" class="light"><a href="#" class="disabled"><svg xmlns="http://www.w3.org/2000/svg" class="ionicon" viewBox="0 0 512 512"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="48" d="M328 112L184 256l144 144"/></svg></a><a href="../2/index.html" title="Page 2"><svg xmlns="http://www.w3.org/2000/svg" class="ionicon" viewBox="0 0 512 512"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="48" d="M184 112l144 144-144 144"/></svg></a></span></li></ul></nav></header><main><!-- Content block --><div class="center witness-layout"><pb-facsimile id="facsimile" base-uri="../../../" default-zoom-level="0" type="image" show-navigation-control="show-navigation-control" show-navigator="show-navigator" subscribe="transcription"/><div class="witness-transcription"><div class="tei-body tei-body2" id="exist-1.9.5.2"><pb-facs-link class="tei-pb tei-pb1" emit="transcription" facs="TTJ/wit/a/img/TTJ_a_00001.jpg">1</pb-facs-link>
            <p class="tei-p tei-p1">
                <pb-popover class="alternate tei-date tei-date2" id="altref_1"><span slot="default">一九七〇年</span><template slot="alternate">1970</template></pb-popover>
                <span class="tei-time tei-time1">初春</span>，<pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_2"><span slot="default">阿尔巴尼亚</span><template slot="alternate"><p class="tei-place tei-place5" id="P0034"/><ul class="tei-place tei-place6 links" id="P0034"/></template></pb-popover>代表团来我国<pb-popover class="alternate tei-choice tei-choice3" id="altref_3"><span slot="default"><span class="tei-reg tei-reg1">访</span></span><template slot="alternate"><span class="tei-orig tei-orig1">訪</span></template></pb-popover>问，临结束<pb-popover class="alternate tei-choice tei-choice3" id="altref_4"><span slot="default"><span class="tei-reg tei-reg1">时</span></span><template slot="alternate"><span class="tei-orig tei-orig1">時</span></template></pb-popover>，向中央要求参观<pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_5"><span slot="default">南京长江大桥</span><template slot="alternate"><p class="tei-place tei-place5" id="P0014"/><ul class="tei-place tei-place6 links" id="P0014"/></template></pb-popover>，<pb-popover class="alternate tei-orgName tei-orgName9 orgName context" id="altref_6"><span slot="default">中央</span><template slot="alternate">
            <span class="tei-orgName tei-orgName7">中央</span>
        </template></pb-popover>经过讨论同意了客人的要求，<pb-popover class="alternate tei-choice tei-choice3" id="altref_7"><span slot="default"><span class="tei-reg tei-reg1">并</span></span><template slot="alternate"><span class="tei-orig tei-orig1">並</span></template></pb-popover>通知<pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_8"><span slot="default">南京市</span><template slot="alternate"><p class="tei-place tei-place5" id="P0001"/><ul class="tei-place tei-place6 links" id="P0001"/></template></pb-popover>着手组织做好接待和保卫工作。</p>
            <p class="tei-p tei-p1">
                <pb-popover class="alternate tei-date tei-date2" id="altref_9"><span slot="default">二月八日这天下午四<pb-popover class="alternate tei-choice tei-choice3" id="altref_10"><span slot="default"><span class="tei-reg tei-reg1">点</span></span><template slot="alternate"><span class="tei-orig tei-orig1">奌</span></template></pb-popover>钟</span><template slot="alternate">1970-02-08T16:00:00</template></pb-popover>，<pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_11"><span slot="default">阿尔巴尼亚</span><template slot="alternate"><p class="tei-place tei-place5" id="P0034"/><ul class="tei-place tei-place6 links" id="P0034"/></template></pb-popover>客人在<pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_12"><span slot="default">南京市</span><template slot="alternate"><p class="tei-place tei-place5" id="P0001"/><ul class="tei-place tei-place6 links" id="P0001"/></template></pb-popover>党政<pb-popover class="alternate tei-choice tei-choice3" id="altref_13"><span slot="default"><span class="tei-reg tei-reg1">负</span></span><template slot="alternate"><span class="tei-orig tei-orig1">負</span></template></pb-popover>责人及公安保卫部陪同参观同志的指引下乘卧车来到<pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_14"><span slot="default">长江大桥</span><template slot="alternate"><p class="tei-place tei-place5" id="P0014"/><ul class="tei-place tei-place6 links" id="P0014"/></template></pb-popover>上，观看了雄伟壮丽的大桥，<pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_15"><span slot="default">阿尔巴尼亚</span><template slot="alternate"><p class="tei-place tei-place5" id="P0034"/><ul class="tei-place tei-place6 links" id="P0034"/></template></pb-popover>客人称赞不已地说<span class="tei-corr tei-corr1">：“</span>
                <pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_16"><span slot="default">中国</span><template slot="alternate"><p class="tei-place tei-place5" id="P0007"/><ul class="tei-place tei-place6 links" id="P0007"/></template></pb-popover>自己设计施工的，真是伟大，可算世界上奇少的第一流大桥，真了不起<span class="tei-corr tei-corr1">。”</span>这<pb-popover class="alternate tei-choice tei-choice3" id="altref_17"><span slot="default"><span class="tei-reg tei-reg1">时</span></span><template slot="alternate"><span class="tei-orig tei-orig1">時</span></template></pb-popover>，陪同参观的一个同志说：“要是<span class="tei-time tei-time1">晚上</span>来看，灯一亮，那这座桥就更漂亮。
                    ”客人一听，认为这是千里迢迢远途来一回，真是难得的机会，所以就高兴地说：“那就<span class="tei-time tei-time1">晚上</span>再来参观吧。”旁陪同的同志这時说：“<span class="tei-date tei-date3">今晚</span>时间已经安排了，七時开宴会，大桥八—十時开<span class="tei-time tei-time1">晚上</span>，就没有時间了，以后安排吧，現在已是…….”话还说完才要抬起手来要报<pb-popover class="alternate tei-choice tei-choice3" id="altref_18"><span slot="default"><span class="tei-reg tei-reg1">现</span></span><template slot="alternate"><span class="tei-orig tei-orig1">現</span></template></pb-popover>在此時的時刻，一辆军用敞<pb-popover class="alternate tei-choice tei-choice3" id="altref_19"><span slot="default"><span class="tei-reg tei-reg1">车</span></span><template slot="alternate"><span class="tei-orig tei-orig1">車</span></template></pb-popover>按着喇叭飞驰而来，陪同的同志刚要续报没说完的時间，一个客人倒先惊叫起来：“嘿，怎么搞的，現在几<pb-popover class="alternate tei-choice tei-choice3" id="altref_20"><span slot="default"><span class="tei-reg tei-reg1">点</span></span><template slot="alternate"><span class="tei-orig tei-orig1">奌</span></template></pb-popover>了，我的手<pb-popover class="alternate tei-choice tei-choice1" id="altref_21"><span slot="default"><span class="tei-corr tei-corr1">表</span></span><template slot="alternate"><span class="tei-sic tei-sic1">錶</span></template></pb-popover>怎么停了<span class="tei-corr tei-corr1">？”</span>周围的同志和客人不约而同抬起手来打算报現在几時，但，一看自己的手錶，都觉得奇怪，怎么手表都停下来不走了，直到约过五分钟后，手表的指针和里面的机件才又嘀嗒嘀嗒地响着，跳动着。</p>
            <p class="tei-p tei-p1">这件事引起陪同参<pb-popover class="alternate tei-choice tei-choice3" id="altref_22"><span slot="default"><span class="tei-reg tei-reg1">观</span></span><template slot="alternate"><span class="tei-orig tei-orig1">覌</span></template></pb-popover>的保卫部人<pb-popover class="alternate tei-choice tei-choice3" id="altref_23"><span slot="default"><span class="tei-reg tei-reg1">员</span></span><template slot="alternate"><span class="tei-orig tei-orig1">員</span></template></pb-popover>的关注，回去后立即向公安局汇报，<pb-popover class="alternate tei-orgName tei-orgName9 orgName context" id="altref_24"><span slot="default">南京公安局</span><template slot="alternate">
            <span class="tei-orgName tei-orgName7">南京公安局</span>
        </template></pb-popover>又报电向<pb-popover class="alternate tei-orgName tei-orgName9 orgName context" id="altref_25"><span slot="default">公安部</span><template slot="alternate">
            <span class="tei-orgName tei-orgName7">公安部</span>
        </template></pb-popover>汇报，公安部接到这个情况，即刻也联想到不久前发生的一件事。</p>
            <p class="tei-p tei-p1"> 那是不久前的一天，<pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_26"><span slot="default">柬埔寨</span><template slot="alternate"><p class="tei-place tei-place5" id="P0022"/><ul class="tei-place tei-place6 links" id="P0022"/></template></pb-popover>国家元首<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_27"><span slot="default">西哈努克</span><template slot="alternate"><h4 class="tei-person tei-person3" id="PE0027"/><ul class="tei-person tei-person9" id="PE0027"/></template></pb-popover>亲王要参覌<pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_28"><span slot="default">南京长江大桥</span><template slot="alternate"><p class="tei-place tei-place5" id="P0014"/><ul class="tei-place tei-place6 links" id="P0014"/></template></pb-popover>的前一天，公安部考虑到他是一个国家元首，一定要保护他的安全，所以决定对大桥绝对保密戒严，<pb-popover class="alternate tei-choice tei-choice3" id="altref_29"><span slot="default"><span class="tei-reg tei-reg1">并</span></span><template slot="alternate"><span class="tei-orig tei-orig1">並</span></template></pb-popover>
                <pb-popover class="alternate tei-choice tei-choice1" id="altref_30"><span slot="default"><span class="tei-corr tei-corr1">布</span></span><template slot="alternate"><span class="tei-sic tei-sic1">佈</span></template></pb-popover>置了保卫工作。<span class="tei-time tei-time1">隔天晚上</span>七奌钟左右，一辆小卧車<pb-popover class="alternate tei-choice tei-choice1" id="altref_31"><span slot="default"><span class="tei-corr tei-corr1">疾</span></span><template slot="alternate"><span class="tei-sic tei-sic1">急</span></template></pb-popover>驶来到<pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_32"><span slot="default">大桥</span><template slot="alternate"><p class="tei-place tei-place5" id="P0014"/><ul class="tei-place tei-place6 links" id="P0014"/></template></pb-popover>桥头，执勤部队打着停車的旗号，車停后，走下来一个部队首长式的人来告诉值勤人員：他的孩子病的<pb-popover class="alternate tei-choice tei-choice1" id="altref_33"><span slot="default"><span class="tei-corr tei-corr1">厉</span></span><template slot="alternate"><span class="tei-sic tei-sic1">利</span></template></pb-popover>害，急需送医院抢救。执勤人员说要有公安局的特别通行证才许通过的。这時。車上又走下一个妇女，马上从口袋里拿着特别通行证给执勤人員看，执勤看后拿不定主意，便叫一个去值班室打电话请示公安局，公安局考虑到今晚大桥是和警<pb-popover class="alternate tei-choice tei-choice1" id="altref_34"><span slot="default"><span class="tei-corr tei-corr1">备</span></span><template slot="alternate"><span class="tei-sic tei-sic1">偹</span></template></pb-popover>区联会统一戒严行动的，所以直接与警偹区商量，征求意<pb-popover class="alternate tei-choice tei-choice3" id="altref_35"><span slot="default"><span class="tei-reg tei-reg1">见</span></span><template slot="alternate"><span class="tei-orig tei-orig1">見</span></template></pb-popover>。警偹区考虑到任务重大，要绝对戒严，但这个情况又特殊，所以为了防止万一，决定同意只妇女带小孩步行过桥，並要执勤人員监視，<pb-popover class="alternate tei-choice tei-choice3" id="altref_36"><span slot="default"><span class="tei-reg tei-reg1">于</span></span><template slot="alternate"><span class="tei-orig tei-orig1">於</span></template></pb-popover>是通知了小卧車调头往回转去了，执勤人員一个人拉着妇女带来的一个十来岁小孩，妇女怀中抱着一个不满周岁的小孩一起上了大桥，可是突然间，走到桥中，小孩不走了，双手<pb-popover class="alternate tei-choice tei-choice1" id="altref_37"><span slot="default"><span class="tei-corr tei-corr1">扳</span></span><template slot="alternate"><span class="tei-sic tei-sic1">板</span></template></pb-popover>
