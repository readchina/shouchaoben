a></li></ul></nav></aside></div></li></ul></nav></div></header><nav class="before-top"><ul/><ul><li><a class="aside-toggle" title="Hide" data-toggle=".before"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-bar-left" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M12.5 15a.5.5 0 0 1-.5-.5v-13a.5.5 0 0 1 1 0v13a.5.5 0 0 1-.5.5M10 8a.5.5 0 0 1-.5.5H3.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L3.707 7.5H9.5a.5.5 0 0 1 .5.5"/></svg></a></li></ul></nav><aside class="before"/><header class="content-top"><nav class="toolbar"><ul/><ul><li><span role="group" class="light"><a href="../3/index.html" title="Page 3"><svg xmlns="http://www.w3.org/2000/svg" class="ionicon" viewBox="0 0 512 512"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="48" d="M328 112L184 256l144 144"/></svg></a><a href="../5/index.html" title="Page 5"><svg xmlns="http://www.w3.org/2000/svg" class="ionicon" viewBox="0 0 512 512"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="48" d="M184 112l144 144-144 144"/></svg></a></span></li></ul></nav></header><main><!-- Content block --><div class="center witness-layout"><pb-facsimile id="facsimile" base-uri="../../../" default-zoom-level="0" type="image" show-navigation-control="show-navigation-control" show-navigator="show-navigator" subscribe="transcription"/><div class="witness-transcription"><div class="tei-body tei-body2" id="exist-1.9.5.20.53"><p class="tei-p tei-p1"><pb-facs-link class="tei-pb tei-pb1" emit="transcription" facs="TTJ/wit/a/img/TTJ_a_00004.jpg">4</pb-facs-link> 道：“谭案破的怎么样啊？”“这个我不清楚”，<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_1"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>答道。“那么你这个专案组长是干什么的，睡大觉吗？”。“不，因为我走的太忙，没有待搞完结归案，所以情况不明”，<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_2"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>继续答道。“那可以，就你知道的情况谈谈也行。”余飞边思索，边慢腾腾地讲了些无关紧要的话，突然站起来，侧身伸向行李架，中年軍人一見，慌忙抓住他的手，<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_3"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>急中生计地说：“不要紧，拿两个苹果解解渴，没关<pb-popover class="alternate tei-choice tei-choice1" id="altref_4"><span slot="default"><span class="tei-corr tei-corr1">系</span></span><template slot="alternate"><span class="tei-sic tei-sic1">係</span></template></pb-popover>。”“不客气”，<pb-popover class="alternate tei-choice tei-choice3" id="altref_5"><span slot="default"><span class="tei-reg tei-reg1">军</span></span><template slot="alternate"><span class="tei-orig tei-orig1">軍</span></template></pb-popover>人一听<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_6"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>的语气后，才松了手说道。谈话间，<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_7"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>已将削好的苹果送了一个给軍人，然后把放在茶几上的苹果皮用手攒到一起，站起来，提起车上的玻璃窗，捧着果皮向外倒去，并<pb-popover class="alternate tei-choice tei-choice1" id="altref_8"><span slot="default"><span class="tei-corr tei-corr1">趁</span></span><template slot="alternate"><span class="tei-sic tei-sic1">乘</span></template></pb-popover>倒果皮与中年軍人又一次低头咬苹果吃的难得之机，余飞象一个运动<pb-popover class="alternate tei-choice tei-choice3" id="altref_9"><span slot="default"><span class="tei-reg tei-reg1">员</span></span><template slot="alternate"><span class="tei-orig tei-orig1">員</span></template></pb-popover>那种灵活的跃力，猛地大喝一声，飞出窗外，等肥大的中年軍人醒悟过来，艰难地伸出头张望时，哪还有<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_10"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>的踪影，只有前进的滚滚火<pb-popover class="alternate tei-choice tei-choice3" id="altref_11"><span slot="default"><span class="tei-reg tei-reg1">车</span></span><template slot="alternate"><span class="tei-orig tei-orig1">車</span></template></pb-popover>轮，不停地向前奔跑着。</p>
            <p class="tei-p tei-p1">
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_12"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>同志摆脱了特务的跟踪谋害以后，改乘了另一列火车，顺利地到达了<pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_13"><span slot="default">北京</span><template slot="alternate"><p class="tei-place tei-place5" id="P0011"/><ul class="tei-place tei-place6 links" id="P0011"/></template></pb-popover>。公安部<pb-popover class="alternate tei-choice tei-choice3" id="altref_14"><span slot="default"><span class="tei-reg tei-reg1">负</span></span><template slot="alternate"><span class="tei-orig tei-orig1">負</span></template></pb-popover>责同志给<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_15"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>布置了任务后，他很高兴，他与<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_16"><span slot="default">陈占祥</span><template slot="alternate"><h4 class="tei-person tei-person3" id="PE0035"/><ul class="tei-person tei-person9" id="PE0035"/></template></pb-popover>是老战友，两人工作一直是对很拿手的<pb-popover class="alternate tei-choice tei-choice3" id="altref_17"><span slot="default"><span class="tei-reg tei-reg1">侦</span></span><template slot="alternate"><span class="tei-orig tei-orig1">偵</span></template></pb-popover>察員。为了更好地完成任务，<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_18"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>同志提出了三个条件：一.需要<pb-popover class="alternate tei-orgName tei-orgName9 orgName context" id="altref_19"><span slot="default">中央办公厅</span><template slot="alternate">
            <span class="tei-orgName tei-orgName7">中央办公厅</span>
        </template></pb-popover>出的一张介绍信，二.给一个随<pb-popover class="alternate tei-choice tei-choice3" id="altref_20"><span slot="default"><span class="tei-reg tei-reg1">时</span></span><template slot="alternate"><span class="tei-orig tei-orig1">時</span></template></pb-popover>调用的軍队权力，三.微型录音机一架，这种录音机和指头一样大，<pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_21"><span slot="default">中国</span><template slot="alternate"><p class="tei-place tei-place5" id="P0007"/><ul class="tei-place tei-place6 links" id="P0007"/></template></pb-popover>只从西德进口四只。三<pb-popover class="alternate tei-choice tei-choice3" id="altref_22"><span slot="default"><span class="tei-reg tei-reg1">项</span></span><template slot="alternate"><span class="tei-orig tei-orig1">項</span></template></pb-popover>要求公安部都表示支持，<pb-popover class="alternate tei-choice tei-choice3" id="altref_23"><span slot="default"><span class="tei-reg tei-reg1">并</span></span><template slot="alternate"><span class="tei-orig tei-orig1">並</span></template></pb-popover>向上级汇报了情况，上级马上批准照办。第二天，<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_24"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>同志就很快地出发了，为了摆脱被特务的再跟踪，<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_25"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>乘快列車到达了<pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_26"><span slot="default">呼和浩特</span><template slot="alternate"><p class="tei-place tei-place5" id="P0015"/><ul class="tei-place tei-place6 links" id="P0015"/></template></pb-popover>，休养了三天后，他到<pb-popover class="alternate tei-choice tei-choice3" id="altref_27"><span slot="default"><span class="tei-reg tei-reg1">邮</span></span><template slot="alternate"><span class="tei-orig tei-orig1">郵</span></template></pb-popover>电局向自己所住招待所发了份电报，内容是：“父病危，吾需速往<pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_28"><span slot="default">上海</span><template slot="alternate"><p class="tei-place tei-place5" id="P0004"/><ul class="tei-place tei-place6 links" id="P0004"/></template></pb-popover>。”他办完手续，並告别了当地有关主要負责同志保密后，就立即临时与火車站长写上，调了一个火車头，专程载往<pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_29"><span slot="default">南京</span><template slot="alternate"><p class="tei-place tei-place5" id="P0001"/><ul class="tei-place tei-place6 links" id="P0001"/></template></pb-popover>，沿路均有火車站的特殊通行证。当离开<pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_30"><span slot="default">内蒙古</span><template slot="alternate"><p class="tei-place tei-place5" id="P0010"/><ul class="tei-place tei-place6 links" id="P0010"/></template></pb-popover>第三天，差离二百里就到<pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_31"><span slot="default">南京</span><template slot="alternate"><p class="tei-place tei-place5" id="P0001"/><ul class="tei-place tei-place6 links" id="P0001"/></template></pb-popover>的时候，<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_32"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>无意中发<pb-popover class="alternate tei-choice tei-choice3" id="altref_33"><span slot="default"><span class="tei-reg tei-reg1">现</span></span><template slot="alternate"><span class="tei-orig tei-orig1">現</span></template></pb-popover>前面的沙发椅上有个很面熟的，带有黑色眼镜，胖胖的人，此特还在看报纸，是谁呢？再一看，对！那人手上有<pb-popover class="alternate tei-choice tei-choice3" id="altref_34"><span slot="default"><span class="tei-reg tei-reg1">颗</span></span><template slot="alternate"><span class="tei-orig tei-orig1">顆</span></template></pb-popover>粗大的黑痣，正是他从<pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_35"><span slot="default">云南</span><template slot="alternate"><p class="tei-place tei-place5" id="P0009"/><ul class="tei-place tei-place6 links" id="P0009"/></template></pb-popover>到<pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_36"><span slot="default">北京</span><template slot="alternate"><p class="tei-place tei-place5" id="P0011"/><ul class="tei-place tei-place6 links" id="P0011"/></template></pb-popover>時，途中遇到的那个軍人。正当他在回忆時，火車在一个小站上停下，<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_37"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>
                <pb-popover class="alternate tei-choice tei-choice1" id="altref_38"><span slot="default"><span class="tei-corr tei-corr1">趁</span></span><template slot="alternate"><span class="tei-sic tei-sic1">乘</span></template></pb-popover>他埋头喝茶之机，提起皮包下了火車，刚走几步，发觉也有两个軍人跟下火車在<pb-popover class="alternate tei-choice tei-choice1" id="altref_39"><span slot="default"><span class="tei-corr tei-corr1">盯</span></span><template slot="alternate"><span class="tei-sic tei-sic1">钉</span></template></pb-popover>他，这時刚好一列货車进站，发出“扑哧，扑哧”的粗气声，<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_40"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>急中生智，几个大步，冲进蒸<pb-popover class="alternate tei-choice tei-choice1" id="altref_41"><span slot="default"><span class="tei-corr tei-corr1">汽</span></span><template slot="alternate"><span class="tei-sic tei-sic1">气</span></template></pb-popover>中，侧身跳上火車头，蒸<pb-popover class="alternate tei-choice tei-choice1" id="altref_42"><span slot="default"><span class="tei-corr tei-corr1">汽</span></span><template slot="alternate"><span class="tei-sic tei-sic1">气</span></template></pb-popover>放过后，两个軍人大汉四处找<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_43"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>的時候，<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_44"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>已乘货車到达了<pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_45"><span slot="default">南京</span><template slot="alternate"><p class="tei-place tei-place5" id="P0001"/><ul class="tei-place tei-place6 links" id="P0001"/></template></pb-popover>，往公安局面<pb-popover class="alternate tei-choice tei-choice3" id="altref_46"><span slot="default"><span class="tei-reg tei-reg1">见</span></span><template slot="alternate"><span class="tei-orig tei-orig1">見</span></template></pb-popover>負责同志，有重要事，<pb-popover class="alternate tei-orgName tei-orgName9 orgName context" id="altref_47"><span slot="default">公安局</span><template slot="alternate">
            <span class="tei-orgName tei-orgName7">公安局</span>
        </template></pb-popover>值班人員打电话请示了一下，党委书记命值班派小車送他到招待所，<span class="tei-date tei-date3">明天</span>再谈。在旁的<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_48"><span slot="default">金<pb-popover class="alternate tei-choice tei-choice1" id="altref_49"><span slot="default"><span class="tei-corr tei-corr1">副</span></span><template slot="alternate"><span class="tei-sic tei-sic1">付</span></template></pb-popover>局长</span><template slot="alternate">#</template></pb-popover>找话说道：“既然是部里来的人，应该领导去接待。”最后<pb-popover class="alternate tei-orgName tei-orgName9 orgName context" id="altref_50"><span slot="default">党委</span><template slot="alternate">
            <span class="tei-orgName tei-orgName7">党委</span>
        </template></pb-popover>局书记就委托<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_51"><span slot="default">金付局长
                </span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0033"><span class="tei-persName tei-persName9">金副局长</span></h1><ul class="tei-person tei-person9" id="PE0033"/></template></pb-popover>去接待<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_52"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>同志，<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_53"><span slot="default">金付局长
                </span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0033"><span class="tei-persName tei-persName9">金副局长</span></h1><ul class="tei-person tei-person9" id="PE0033"/></template></pb-popover>用自己的专用小卧車接送<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_54"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>去公安局招待<pb-popover class="alternate tei-choice tei-choice1" id="altref_55"><span slot="default"><span class="tei-corr tei-corr1">所</span></span><template slot="alternate"><span class="tei-sic tei-sic1">手</span></template></pb-popover>，安排了一个非常舒服的 </p></div></div></div></main><nav class="after-top"><ul><li><a class="aside-toggle" title="Hide" data-toggle=".after"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-bar-left" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M12.5 15a.5.5 0 0 1-.5-.5v-13a.5.5 0 0 1 1 0v13a.5.5 0 0 1-.5.5M10 8a.5.5 0 0 1-.5.5H3.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L3.707 7.5H9.5a.5.5 0 0 1 .5.5"/></svg></a></li></ul></nav><aside class="after"><div class="tab-panel"><span class="tab-title" data-title="Register">Register</span><div class="register-panel"><div class="register" id="exist-1.9.5.20.53"><h3>People</h3><ul><li class="tei-person tei-person2" id="PE0005"><a href="/shouchaoben/people/PE0005" class="persName"><pb-popover><span slot="default">余飞</span><template slot="alternate"/></pb-popover></a></li><li class="tei-person tei-person2" id="PE0035"/><li class="tei-person tei-person2" id="PE0033"><a href="/shouchaoben/people/PE0033" class="persName"><pb-popover><span slot="default">金副局长</span><template slot="alternate"/></pb-popover></a></li></ul><h3>Places</h3><ul><li class="tei-place tei-place2"
