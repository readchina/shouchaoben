a></li></ul></nav></aside></div></li></ul></nav></div></header><nav class="before-top"><ul/><ul><li><a class="aside-toggle" title="Hide" data-toggle=".before"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-bar-left" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M12.5 15a.5.5 0 0 1-.5-.5v-13a.5.5 0 0 1 1 0v13a.5.5 0 0 1-.5.5M10 8a.5.5 0 0 1-.5.5H3.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L3.707 7.5H9.5a.5.5 0 0 1 .5.5"/></svg></a></li></ul></nav><aside class="before"/><header class="content-top"><nav class="toolbar"><ul/><ul><li><span role="group" class="light"><a href="../7/index.html" title="Page 7"><svg xmlns="http://www.w3.org/2000/svg" class="ionicon" viewBox="0 0 512 512"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="48" d="M328 112L184 256l144 144"/></svg></a><a href="../9/index.html" title="Page 9"><svg xmlns="http://www.w3.org/2000/svg" class="ionicon" viewBox="0 0 512 512"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="48" d="M184 112l144 144-144 144"/></svg></a></span></li></ul></nav></header><main><!-- Content block --><div class="center witness-layout"><pb-facsimile id="facsimile" base-uri="../../../" default-zoom-level="0" type="image" show-navigation-control="show-navigation-control" show-navigator="show-navigator" subscribe="transcription"/><div class="witness-transcription"><div class="tei-body tei-body2" id="exist-1.9.2.96.4"><p class="tei-p tei-p1"><pb-facs-link class="tei-pb tei-pb1" emit="transcription" facs="TTJ/wit/c/img/TTJ_c_00008.jpg">8</pb-facs-link>
                公厅介绍信，要警备局立即逮捕<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_1"><span slot="default">金副局长
                </span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0033"><span class="tei-persName tei-persName9">金副局长</span></h1><ul class="tei-person tei-person9" id="PE0033"/></template></pb-popover>。警备局负责同志感到为难，说：“
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_2"><span slot="default">金副局长
                </span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0033"><span class="tei-persName tei-persName9">金副局长</span></h1><ul class="tei-person tei-person9" id="PE0033"/></template></pb-popover>
                是中央管的干部，警备局无权处理。”商量下，警备局只好同意拘留审查，
                <span class="tei-date tei-date3">今后</span>
                好说话。
            </p>
            <p class="tei-p tei-p1">
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_3"><span slot="default">金副局长
                </span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0033"><span class="tei-persName tei-persName9">金副局长</span></h1><ul class="tei-person tei-person9" id="PE0033"/></template></pb-popover>
                被拘留在警备局的一间房子里，他不吃饭，不睡觉，对服侍他的警卫员大发脾气：“我是中央管的干部，警备局无权处理，无权审查。”警备局不好来见，便请
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_4"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>
                来见<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_5"><span slot="default">金</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0033"><span class="tei-persName tei-persName9">金副局长</span></h1><ul class="tei-person tei-person9" id="PE0033"/></template></pb-popover>。<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_6"><span slot="default">金</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0033"><span class="tei-persName tei-persName9">金副局长</span></h1><ul class="tei-person tei-person9" id="PE0033"/></template></pb-popover>一见
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_7"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>
                ，好象（
                Korrektur
                像）找到了说话的地方，说：“警备局不按政策，无理取闹，部里来的同志给
                <pb-popover class="alternate tei-choice tei-choice1" id="altref_8"><span slot="default"><span class="tei-corr tei-corr1">做</span></span><template slot="alternate"><span class="tei-sic tei-sic1">作</span></template></pb-popover>
                主吧！”
            </p>
            <p class="tei-p tei-p1">
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_9"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>
                笑着回答：“让它作主吧。”拿出录音机，打开开关，立即<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_10"><span slot="default">金</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0033"><span class="tei-persName tei-persName9">金副局长</span></h1><ul class="tei-person tei-person9" id="PE0033"/></template></pb-popover>的声音在录音机里说话了。听到声音，<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_11"><span slot="default">金</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0033"><span class="tei-persName tei-persName9">金副局长</span></h1><ul class="tei-person tei-person9" id="PE0033"/></template></pb-popover>的脸吓得惨白，他低下头咬了一下自己的衣领，便晕倒在沙发上。
            </p>
            <p class="tei-p tei-p1">
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_12"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>
                放完录音机，满意的放好机子，正想说：“怎么样，明白吗？”一看<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_13"><span slot="default">金</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0033"><span class="tei-persName tei-persName9">金副局长</span></h1><ul class="tei-person tei-person9" id="PE0033"/></template></pb-popover>晕倒在沙发上，口吐白沫死了。
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_14"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>
                后悔自己的粗心大意。他让警备局处理<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_15"><span slot="default">金</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0033"><span class="tei-persName tei-persName9">金副局长</span></h1><ul class="tei-person tei-person9" id="PE0033"/></template></pb-popover>的后事，並（
                Korrektur
                并）监视女服务员，自己乘飞机回
                <pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_16"><span slot="default">北京</span><template slot="alternate"><p class="tei-place tei-place5" id="P0011"/><ul class="tei-place tei-place6 links" id="P0011"/></template></pb-popover>
                ，汇报工作，研究下一步工作。
            </p>
            <p class="tei-p tei-p1">
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_17"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>
                回到
                <pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_18"><span slot="default">北京</span><template slot="alternate"><p class="tei-place tei-place5" id="P0011"/><ul class="tei-place tei-place6 links" id="P0011"/></template></pb-popover>
                刚两                        天，就接到
                <pb-popover class="alternate tei-orgName tei-orgName9 orgName context" id="altref_19"><span slot="default">南京警备局</span><template slot="alternate">
            <span class="tei-orgName tei-orgName7">南京警备局</span>
        </template></pb-popover>
                的电报说：“女服务员自杀了。”
                <pb-popover class="alternate tei-orgName tei-orgName9 orgName context" id="altref_20"><span slot="default">公安部</span><template slot="alternate">
            <span class="tei-orgName tei-orgName7">公安部</span>
        </template></pb-popover>
                根据新的情况分析，决定从女服务员身上开刀，把断的线头再接起来，查清楚。于是
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_21"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>
                二次下
                <pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_22"><span slot="default">南京</span><template slot="alternate"><p class="tei-place tei-place5" id="P0001"/><ul class="tei-place tei-place6 links" id="P0001"/></template></pb-popover>
                。
            </p>
            <p class="tei-p tei-p1">
                经过现场分析，女服务员是用手帕自杀的，这种手帕是国际工厂专门为间谍生产的，只要用这种手帕在鼻子上一
                <pb-popover class="alternate tei-choice tei-choice1" id="altref_23"><span slot="default"><span class="tei-corr tei-corr1">晃</span></span><template slot="alternate"><span class="tei-sic tei-sic1">幌</span></template></pb-popover>
                ，就可以使人晕倒在地。女服务员是在被监视后，用手帕擦眼、泪水、鼻子，中毒而死的。招待所每天都有许多人来来往往，很不好查。
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_24"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>
                组织全所同志
                </p></div></div></div></main><nav class="after-top"><ul><li><a class="aside-toggle" title="Hide" data-toggle=".after"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-bar-left" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M12.5 15a.5.5 0 0 1-.5-.5v-13a.5.5 0 0 1 1 0v13a.5.5 0 0 1-.5.5M10 8a.5.5 0 0 1-.5.5H3.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L3.707 7.5H9.5a.5.5 0 0 1 .5.5"/></svg></a></li></ul></nav><aside class="after"><div class="tab-panel"><span class="tab-title" data-title="Register">Register</span><div class="register-panel"><div class="register" id="exist-1.9.2.96.4"><h3>People</h3><ul><li class="tei-person tei-person2" id="PE0033"><a href="/shouchaoben/people/PE0033" class="persName"><pb-popover><span slot="default">金副局长</span><template slot="alternate"/></pb-popover></a></li><li class="tei-person tei-person2" id="PE0005"><a href="/shouchaoben/people/PE0005" class="persName"><pb-popover><span slot="default">余飞</span><template slot="alternate"/></pb-popover></a></li></ul><h3>Places</h3><ul><li class="tei-place tei-place2" id="P0011"><pb-geolocation event="mouseover" longitude="" latitude="" label="" auto="auto" wait-for="pb-leaflet-map" zoom="11" emit="map"/></li><li class="tei-place tei-place2" id="P0001"><pb-geolocation event="mouseover" longitude="118.77778" latitude="32.06167" label="南京 Nanjing" auto="auto" wait-for="pb-leaflet-map" zoom="11" emit="map"><a href="/shouchaoben/places/P0001" class="placeName context"><pb-popover><span slot="default">南京</span><template slot="alternate"/></pb-popover></a><a href="/shouchaoben/places/P0001" class="placeName context"><pb-popover><span slot="default">Nanjing</span><template slot="alternate"/></pb-popover></a></pb-geolocation></li></ul></div></div></div><pb-leaflet-map id="map" zoom="11" subscribe="map"><pb-map-layer show="" base="" label="OpenTopo Map" url="https://{s}.tile.openstreetmap.de/tiles             <div><h3><pb-i18n key="odd.sources"/></h3><ul>
                <li class="tei-msDesc tei-msDesc1">
                    
                        Lena Henningsen private collection
                    
                    
                        Manuscript fiction from the Chinese Cultural Revolution. The text indicates that it is the first volume in a collection of anti-espionage fiction stories. The titles of the other stories in the series are provided on the back cover: The tall grey building (灰色的大楼), The skin of the twelfth beauty (第十二张美人皮), The green corpse (绿色的尸体) and The plum blossom map (一副梅花图).
                        
                            <li class="tei-bibl tei-bibl1">
                                <div class="tei-author tei-author1">Anonymous</div>
                                <div class="tei-title tei-title2">余飞三下南京</div>
                                <span class="tei-placeName tei-placeName11">no place</span>
                                <pb-popover class="alternate tei-date tei-date2" id="altref_5"><span slot="default">no date</span><template slot="alternate">1977</template></pb-popover>
                            </li>
                        
                    
                    
                        
                            <p class="tei-p tei-p3">15 pages of thin note paper, rebound on the left hand side into a single squire, measuring 19,5 times 26,5 cm.</p>
