a></li></ul></nav></aside></div></li></ul></nav></div></header><nav class="before-top"><ul/><ul><li><a class="aside-toggle" title="Hide" data-toggle=".before"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-bar-left" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M12.5 15a.5.5 0 0 1-.5-.5v-13a.5.5 0 0 1 1 0v13a.5.5 0 0 1-.5.5M10 8a.5.5 0 0 1-.5.5H3.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L3.707 7.5H9.5a.5.5 0 0 1 .5.5"/></svg></a></li></ul></nav><aside class="before"/><header class="content-top"><nav class="toolbar"><ul/><ul><li><span role="group" class="light"><a href="../8/index.html" title="Page 8"><svg xmlns="http://www.w3.org/2000/svg" class="ionicon" viewBox="0 0 512 512"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="48" d="M328 112L184 256l144 144"/></svg></a><a href="../10/index.html" title="Page 10"><svg xmlns="http://www.w3.org/2000/svg" class="ionicon" viewBox="0 0 512 512"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="48" d="M184 112l144 144-144 144"/></svg></a></span></li></ul></nav></header><main><!-- Content block --><div class="center witness-layout"><pb-facsimile id="facsimile" base-uri="../../../" default-zoom-level="0" type="image" show-navigation-control="show-navigation-control" show-navigator="show-navigator" subscribe="transcription"/><div class="witness-transcription"><div class="tei-body tei-body2" id="exist-1.9.2.106.16"><p class="tei-p tei-p1"><pb-facs-link class="tei-pb tei-pb1" emit="transcription" facs="TTJ/wit/c/img/TTJ_c_00009.jpg">9</pb-facs-link>
                座谈。回忆了几天，有个人才想起来，
                <span class="tei-date tei-date3">当时</span>
                有个开卡
                <pb-popover class="alternate tei-choice tei-choice3" id="altref_1"><span slot="default"><span class="tei-reg tei-reg1">车</span></span><template slot="alternate"><span class="tei-orig tei-orig1">車</span></template></pb-popover>
                的小伙子常来找这个女服务员，但不知車号和小伙子的姓名。公安局查了几天，卡車只有四十多辆，再还要缩小范围，才查明经常找这个女服务员的小伙子名叫
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_2"><span slot="default">王真</span><template slot="alternate"><h4 class="tei-person tei-person3" id="PE0021"/><ul class="tei-person tei-person9" id="PE0021"/></template></pb-popover>
                ，是本市“
                <span class="tei-time tei-time1">5・71</span>
                ”信箱的汽车司机，車号：69-264号。驾驶员半年前已去
                <pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_3"><span slot="default">上海</span><template slot="alternate"><p class="tei-place tei-place5" id="P0004"/><ul class="tei-place tei-place6 links" id="P0004"/></template></pb-popover>
                出差。为避免打草惊蛇，公安局通知全市交通民警，571信箱的69-264号車回来后，要暗中监视，
                <pb-popover class="alternate tei-choice tei-choice1" id="altref_4"><span slot="default"><span class="tei-corr tei-corr1">并</span></span><template slot="alternate"><span class="tei-sic tei-sic1">並</span></template></pb-popover>
                立即上报。
            </p>
            <p class="tei-p tei-p1">
                第四天
                <span class="tei-time tei-time1">下午</span>
                ，
                <pb-popover class="alternate tei-orgName tei-orgName9 orgName context" id="altref_5"><span slot="default">公安局</span><template slot="alternate">
            <span class="tei-orgName tei-orgName7">公安局</span>
        </template></pb-popover>
                报告
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_6"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>
                ，交通队来电话说69-264号車回
                <pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_7"><span slot="default">南京</span><template slot="alternate"><p class="tei-place tei-place5" id="P0001"/><ul class="tei-place tei-place6 links" id="P0001"/></template></pb-popover>
                了，
                <span class="tei-date tei-date3">现在</span>
                <pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_8"><span slot="default">东大街</span><template slot="alternate"><p class="tei-place tei-place5" id="P0006"/><ul class="tei-place tei-place6 links" id="P0006"/></template></pb-popover>
                中段行驶。
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_9"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>
                听罢，立即叫公安部来
                <pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_10"><span slot="default">南京</span><template slot="alternate"><p class="tei-place tei-place5" id="P0001"/><ul class="tei-place tei-place6 links" id="P0001"/></template></pb-popover>
                出差的小罗做助手，开动公安局的吉普車，不多时便追上了69-264号車。两辆車一前一后，始终保持半里的距离。卡車开上了小路，
                吉普車
                也上了小路。黄昏时卡車开进了山陵的一个树林里，一拐弯不见了。这时天已渐渐黑了，
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_11"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>
                和小罗也把車开进了树林放好。两个人把无声手枪推上了子弹，进树林里搜查起来。搜查一阵，发现不来远有灯光闪闪。走近一看，树林的山脚下有两幢三层楼房，周围一丈多高的围墙，並且上面有电网。
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_12"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>
                穿好绝缘服，爬上一棵大树，看见墙里有明亮的灯光，看见花园和小运动场。在运动场上停着一辆嘎斯69和两辆小卧車。在葡萄树下，有四、五个中年軍（
                Kurzzeichen
                军）人在休息谈天。
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_13"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>
                估计这是571信箱的外属軍事机关。想罢纵身一跃，越过电网，轻轻一跳到了花园，躲在暗处，注视着楼下闪着亮光的办公室。办公室草绿色的沙发上坐着一个身穿軍装的女青年，看样子不过20岁左右。桌上台灯的光亮映在她那白净的脸上，细看上去，显得格外漂亮。她好
                <pb-popover class="alternate tei-choice tei-choice1" id="altref_14"><span slot="default"><span class="tei-corr tei-corr1">像</span></span><template slot="alternate"><span class="tei-sic tei-sic1">象</span></template></pb-popover>
                仔细地看一份打印的材料，不时用
                <pb-popover class="alternate tei-choice tei-choice3" id="altref_15"><span slot="default"><span class="tei-reg tei-reg1">笔</span></span><template slot="alternate"><span class="tei-orig tei-orig1">筆</span></template></pb-popover>
                在上面点着划着。突然门外
                </p></div></div></div></main><nav class="after-top"><ul><li><a class="aside-toggle" title="Hide" data-toggle=".after"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-bar-left" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M12.5 15a.5.5 0 0 1-.5-.5v-13a.5.5 0 0 1 1 0v13a.5.5 0 0 1-.5.5M10 8a.5.5 0 0 1-.5.5H3.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L3.707 7.5H9.5a.5.5 0 0 1 .5.5"/></svg></a></li></ul></nav><aside class="after"><div class="tab-panel"><span class="tab-title" data-title="Register">Register</span><div class="register-panel"><div class="register" id="exist-1.9.2.106.16"><h3>People</h3><ul><li class="tei-person tei-person2" id="PE0021"/><li class="tei-person tei-person2" id="PE0005"><a href="/shouchaoben/people/PE0005" class="persName"><pb-popover><span slot="default">余飞</span><template slot="alternate"/></pb-popover></a></li></ul><h3>Places</h3><ul><li class="tei-place tei-place2" id="P0004"><pb-geolocation event="mouseover" longitude="" latitude="" label="" auto="auto" wait-for="pb-leaflet-map" zoom="11" emit="map"/></li><li class="tei-place tei-place2" id="P0001"><pb-geolocation event="mouseover" longitude="118.77778" latitude="32.06167" label="南京 Nanjing" auto="auto" wait-for="pb-leaflet-map" zoom="11" emit="map"><a href="/shouchaoben/places/P0001" class="placeName context"><pb-popover><span slot="default">南京</span><template slot="alternate"/></pb-popover></a><a href="/shouchaoben/places/P0001" class="placeName context"><pb-popover><span slot="default">Nanjing</span><template slot="alternate"/></pb-popover></a></pb-geolocation></li><li class="tei-place tei-place2" id="P0006"><pb-geolocation event="mouseover" longitude="" latitude="" label="" auto="auto" wait-for="pb-leaflet-map" zoom="11" emit="map"/></li></ul></div></div></div><pb-leaflet-map id="map" zoom="11" subscribe="map"><pb-map-layer show="" base="" label="OpenTopo Map" url="https:/                     and

                    <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_3"><span slot="default">Joschua Seiler</span><template slot="alternate">https://orcid.org/0000-0002-4416-0837</template></pb-popover>

            <div><h3><pb-i18n key="odd.sources"/></h3><ul>
                <li class="tei-msDesc tei-msDesc1">
                    
                        Lena Henningsen private collection
                    
                    
                        Manuscript fiction from the Chinese Cultural Revolution. The text indicates that it is the first volume in a collection of anti-espionage fiction stories. The titles of the other stories in the series are provided on the back cover: The tall grey building (灰色的大楼), The skin of the twelfth beauty (第十二张美人皮), The green corpse (绿色的尸体) and The plum blossom map (一副梅花图).
                        
                            <li class="tei-bibl tei-bibl1">
                                <div class="tei-author tei-author1">Anonymous</div>
                                <div class="tei-title tei-title2">余飞三下南京</div>
                                <span class="tei-placeName tei-placeName11">no place</span>
                                <pb-popover class="alternate tei-date tei-date2" id="altref_5"><span slot="default">no date</span><template slot="alternate">1977</template></pb-popover>
                            </li>
                        
                    
                    
                        
                            <p class="tei-p tei-p3">15 pages of thin note paper, rebound on the left hand side into a single squire, measuring 19,5 times 26,5 cm.</p>
                            <p class="tei-p tei-p3">Pages 1-14 are margined and ruled throughout with page numbers starting after  the title page until page 14. Page 15 is blank paper.</p>
                            <p class="tei-p tei-p3">Front and  back cover pages are of slightly thicker paper quality and blank.</p>
                            <p class="tei-p tei-p3">Single hand throughout.</p>
                            <p class="tei-p tei-p3">Text written only on front sides of the pages throughout, except back cover page: text on front and reverse side.</p>
                            <p class="tei-p tei-p3">Pages 1-14 written in black ink, page 15, front and back cover in blue ink.</p>
                        
                    
                </li>
            </ul></div>
