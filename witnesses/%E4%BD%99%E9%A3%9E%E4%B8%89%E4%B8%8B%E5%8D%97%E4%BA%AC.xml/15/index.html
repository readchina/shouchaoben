            <p class="tei-p tei-p1">（第15页，原文写为竖排，未标页码，本文为方便读者阅读，抄写为横排）</p>
            <p class="tei-p tei-p1">
                关于
                <pb-popover class="alternate tei-orgName tei-orgName9 orgName context" id="altref_1"><span slot="default">云南省委</span><template slot="alternate">
            <span class="tei-orgName tei-orgName7">云南省委</span>
        </template></pb-popover>
                第一                        书记
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_2"><span slot="default">谭甫仁</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0031"><span class="tei-persName tei-persName9">谭甫仁</span></h1><ul class="tei-person tei-person9" id="PE0031"/></template></pb-popover>
                之死的说明
            </p>
            <p class="tei-p tei-p1">
                在余飞三下
                <pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_3"><span slot="default">南京</span><template slot="alternate"><p class="tei-place tei-place5" id="P0001"/><ul class="tei-place tei-place6 links" id="P0001"/></template></pb-popover>
                之中曾提到
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_4"><span slot="default">谭甫仁</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0031"><span class="tei-persName tei-persName9">谭甫仁</span></h1><ul class="tei-person tei-person9" id="PE0031"/></template></pb-popover>
                被刺事件，但未说明原因，现据可靠消息补充说明情况：
            </p>
            <p class="tei-p tei-p1">
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_5"><span slot="default">谭甫仁</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0031"><span class="tei-persName tei-persName9">谭甫仁</span></h1><ul class="tei-person tei-person9" id="PE0031"/></template></pb-popover>
                死前不久，他接到
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_6"><span slot="default">林彪</span><template slot="alternate"><h4 class="tei-person tei-person3" id="PE0015"/><ul class="tei-person tei-person9" id="PE0015"/></template></pb-popover>
                （据说尚有
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_7"><span slot="default">江青</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0019"><span class="tei-persName tei-persName9">江青</span></h1><ul class="tei-person tei-person9" id="PE0019"/></template></pb-popover>
                ）一封绝密电报，大意曰：某日某时有一架不明国籍飞机飞过
                <pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_8"><span slot="default">昆明</span><template slot="alternate"><p class="tei-place tei-place5" id="P0020"/><ul class="tei-place tei-place6 links" id="P0020"/></template></pb-popover>
                ，越境叛逃外国，令其击毁该机。于是
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_9"><span slot="default">谭</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0031"><span class="tei-persName tei-persName9">谭甫仁</span></h1><ul class="tei-person tei-person9" id="PE0031"/></template></pb-popover>
                令其部队作好准备。果然该日该时有一架飞机自此飞来
                <pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_10"><span slot="default">昆明</span><template slot="alternate"><p class="tei-place tei-place5" id="P0020"/><ul class="tei-place tei-place6 links" id="P0020"/></template></pb-popover>
                ，但情况有出入，因该机标有“
                <pb-popover class="alternate tei-orgName tei-orgName9 orgName context" id="altref_11"><span slot="default">中国民航</span><template slot="alternate">
            <span class="tei-orgName tei-orgName7">中国民航</span>
        </template></pb-popover>
                ”字样，且编号一清二楚，<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_12"><span slot="default">谭</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0031"><span class="tei-persName tei-persName9">谭甫仁</span></h1><ul class="tei-person tei-person9" id="PE0031"/></template></pb-popover>不敢下令击毁，于是令机群起飞迫降。等到该机在机场降落后，从飞机里走出一人，<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_13"><span slot="default">谭</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0031"><span class="tei-persName tei-persName9">谭甫仁</span></h1><ul class="tei-person tei-person9" id="PE0031"/></template></pb-popover>一见，
                <pb-popover class="alternate tei-choice tei-choice1" id="altref_14"><span slot="default"><span class="tei-corr tei-corr1">吓</span></span><template slot="alternate"><span class="tei-sic tei-sic1">嚇</span></template></pb-popover>
                得面如土色，冷汗湿衫。原来从飞机里走出的並（
                Korrektur
                并）非别人，正是我们敬爱的<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_15"><span slot="default">周总理
                </span><template slot="alternate"><h4 class="tei-person tei-person3" id="PE0007"/><ul class="tei-person tei-person9" id="PE0007"/></template></pb-popover>。
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_16"><span slot="default">谭</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0031"><span class="tei-persName tei-persName9">谭甫仁</span></h1><ul class="tei-person tei-person9" id="PE0031"/></template></pb-popover>
                含泪把绝密电报交给了
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_17"><span slot="default">周总理
                </span><template slot="alternate"><h4 class="tei-person tei-person3" id="PE0007"/><ul class="tei-person tei-person9" id="PE0007"/></template></pb-popover>。真
                <pb-popover class="alternate tei-choice tei-choice1" id="altref_18"><span slot="default"><span class="tei-corr tei-corr1">相</span></span><template slot="alternate"><span class="tei-sic tei-sic1">像</span></template></pb-popover>
                大白，<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_19"><span slot="default">林</span><template slot="alternate"><h4 class="tei-person tei-person3" id="PE0015"/><ul class="tei-person tei-person9" id="PE0015"/></template></pb-popover>、<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_20"><span slot="default">江</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0019"><span class="tei-persName tei-persName9">江青</span></h1><ul class="tei-person tei-person9" id="PE0019"/></template></pb-popover>一伙妄图趁总理出国访问途经
                <pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_21"><span slot="default">昆明</span><template slot="alternate"><p class="tei-place tei-place5" id="P0020"/><ul class="tei-place tei-place6 links" id="P0020"/></template></pb-popover>
                时陷害总理。事后
                <span class="tei-time tei-time1">不久</span>
                ，<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_22"><span slot="default">谭</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0031"><span class="tei-persName tei-persName9">谭甫仁</span></h1><ul class="tei-person tei-person9" id="PE0031"/></template></pb-popover>全家被刺。
            </p>
            <p class="tei-p tei-p1">
                据说，这封电报直到总理病危逝世前，才嘱咐
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_23"><span slot="default">邓颖超</span><template slot="alternate"><h4 class="tei-person tei-person3" id="PE0032"/><ul class="tei-person tei-person9" id="PE0032"/></template></pb-popover>
                交给一位可靠的人——许世友司令员。
            </p>
            <p class="tei-p tei-p1">
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_24"><span slot="default">谭</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0031"><span class="tei-persName tei-persName9">谭甫仁</span></h1><ul class="tei-person tei-person9" id="PE0031"/></template></pb-popover>生前靠近林贼，在党的九届二中全会上和
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_25"><span slot="default">林彪</span><template slot="alternate"><h4 class="tei-person tei-person3" id="PE0015"/><ul class="tei-person tei-person9" id="PE0015"/></template></pb-popover>
                、
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_26"><span slot="default">陈伯达</span><template slot="alternate"><h4 class="tei-person tei-person3" id="PE0034"/><ul class="tei-person tei-person9" id="PE0034"/></template></pb-popover>
                大吹天才论。但尚未迈到反总理的地步。
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_27"><span slot="default">谭</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0031"><span class="tei-persName tei-persName9">谭甫仁</span></h1><ul class="tei-person tei-person9" id="PE0031"/></template></pb-popover>
                早已被刺身死，
                <span class="tei-date tei-date3">那时</span>
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_28"><span slot="default">林彪</span><template slot="alternate"><h4 class="tei-person tei-person3" id="PE0015"/><ul class="tei-person tei-person9" id="PE0015"/></template></pb-popover>
                尚未完全暴露。应该用历史唯物主义来评价他。
                <span class="tei-date tei-date3">当时</span>
                报纸评价似有异议。
            </p>

            <div><h3><pb-i18n key="odd.sources"/></h3><ul>
                <li class="tei-msDesc tei-msDesc1">
                    
                        Lena Henningsen private collection
                    
                    
                        Manuscript fiction from the Chinese Cultural Revolution. The text indicates that it is the first volume in a collection of anti-espionage fiction stories. The titles of the other stories in the series are provided on the back cover: The tall grey building (灰色的大楼), The skin of the twelfth beauty (第十二张美人皮), The green corpse (绿色的尸体) and The plum blossom map (一副梅花图).
