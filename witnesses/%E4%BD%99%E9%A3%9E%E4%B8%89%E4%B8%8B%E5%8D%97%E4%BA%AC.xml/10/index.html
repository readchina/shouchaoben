a></li></ul></nav></aside></div></li></ul></nav></div></header><nav class="before-top"><ul/><ul><li><a class="aside-toggle" title="Hide" data-toggle=".before"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-bar-left" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M12.5 15a.5.5 0 0 1-.5-.5v-13a.5.5 0 0 1 1 0v13a.5.5 0 0 1-.5.5M10 8a.5.5 0 0 1-.5.5H3.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L3.707 7.5H9.5a.5.5 0 0 1 .5.5"/></svg></a></li></ul></nav><aside class="before"/><header class="content-top"><nav class="toolbar"><ul/><ul><li><span role="group" class="light"><a href="../9/index.html" title="Page 9"><svg xmlns="http://www.w3.org/2000/svg" class="ionicon" viewBox="0 0 512 512"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="48" d="M328 112L184 256l144 144"/></svg></a><a href="../11/index.html" title="Page 11"><svg xmlns="http://www.w3.org/2000/svg" class="ionicon" viewBox="0 0 512 512"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="48" d="M184 112l144 144-144 144"/></svg></a></span></li></ul></nav></header><main><!-- Content block --><div class="center witness-layout"><pb-facsimile id="facsimile" base-uri="../../../" default-zoom-level="0" type="image" show-navigation-control="show-navigation-control" show-navigator="show-navigator" subscribe="transcription"/><div class="witness-transcription"><div class="tei-body tei-body2" id="exist-1.9.2.108.58"><p class="tei-p tei-p1"><pb-facs-link class="tei-pb tei-pb1" emit="transcription" facs="TTJ/wit/c/img/TTJ_c_00010.jpg">10</pb-facs-link>
                有人喊“报告”，她头也不抬随口答应：“进来。”
            </p>
            <p class="tei-p tei-p1">
                “报告首长，他死也不招。”开门进来两个軍（
                Kurzzeichen
                军）人大汉，其中一个的手腕上有颗黑痣。
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_1"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>
                一惊，想起来了，从
                <pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_2"><span slot="default">云南</span><template slot="alternate"><p class="tei-place tei-place5" id="P0009"/><ul class="tei-place tei-place6 links" id="P0009"/></template></pb-popover>
                回
                <pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_3"><span slot="default">北京</span><template slot="alternate"><p class="tei-place tei-place5" id="P0011"/><ul class="tei-place tei-place6 links" id="P0011"/></template></pb-popover>
                时在
                <pb-popover class="alternate tei-choice tei-choice3" id="altref_4"><span slot="default"><span class="tei-reg tei-reg1">车</span></span><template slot="alternate"><span class="tei-orig tei-orig1">車</span></template></pb-popover>
                上遇到的那个人，这是第三次见面了。想到这里，听那女人说：“给
                <pb-popover class="alternate tei-choice tei-choice1" id="altref_5"><span slot="default"><span class="tei-corr tei-corr1">他</span></span><template slot="alternate"><span class="tei-sic tei-sic1">她</span></template></pb-popover>
                讲清楚，只要说明干啥，保证他安全，照样是干部。”声音清脆严厉。
            </p>
            <p class="tei-p tei-p1">“软硬办法用尽了。”</p>
            <p class="tei-p tei-p1">女人又说：“给我带进来，我就不信他是钢铁铸的。”此人生气了。</p>
            <p class="tei-p tei-p1">“是！”两个軍人敬了个礼，转身走了出去。一会儿，一个遍体是伤，头发蓬乱的人被带进来了。</p>
            <p class="tei-p tei-p1">那女人劝他说：“落在我们手里要识时务，要......”</p>
            <p class="tei-p tei-p1">
                被
                <pb-popover class="alternate tei-choice tei-choice1" id="altref_6"><span slot="default"><span class="tei-corr tei-corr1">拖</span></span><template slot="alternate"><span class="tei-sic tei-sic1">托</span></template></pb-popover>
                进来的人猛抬起头，严厉的说：“胡说，你们是一伙狗特务......”破口大骂，两只眼睛里闪着怒火。这人一抬头，藏在窗外的余飞大吃一惊，“
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_7"><span slot="default">陈占祥</span><template slot="alternate"><h4 class="tei-person tei-person3" id="PE0035"/><ul class="tei-person tei-person9" id="PE0035"/></template></pb-popover>
                ”，
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_8"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>
                差一点叫出声来。女人被骂得面红耳赤，恼羞成怒，揮（
                Kurzzeichen
                挥）着手叫拖出去枪毙
                <pb-popover class="alternate tei-choice tei-choice1" id="altref_9"><span slot="default"><span class="tei-corr tei-corr1">算</span></span><template slot="alternate"><span class="tei-sic tei-sic1">祘</span></template></pb-popover>
                了。
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_10"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>
                这时潜入后花园，刚藏好，就看见一个黑影举着枪，对着近处一个躺着的人。
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_11"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>
                把手中时刻握着的无声手枪，一枪放倒了那个黑影。这时，听屋里又走出一个人边走边说：“咋这么啰嗦。”
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_12"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>
                又举起枪放倒了那个。
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_13"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>
                立即几个箭步跑到跟前，两手用力举起那个人，设法推出墙外，
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_14"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>
                也跃身而出。刚落地就觉得有硬梆梆（
                Korrektur邦
                ）的东西顶住了心窝，听到一声：“不准动。”
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_15"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>
                一听声音是<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_16"><span slot="default">小罗</span><template slot="alternate"><h4 class="tei-person tei-person3" id="PE0010"/><ul class="tei-person tei-person9" id="PE0010"/></template></pb-popover>，忙说：“快上車，把这个人带回去。”原来<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_17"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>潜入墙内，<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_18"><span slot="default">小罗</span><template slot="alternate"><h4 class="tei-person tei-person3" id="PE0010"/><ul class="tei-person tei-person9" id="PE0010"/></template></pb-popover>一直在外面巡逻。正着急，忽然从围墙里抛出一个东西，赶忙接住，差一点把小罗砸倒，一看是个遍体是伤的人。又是一个人跳出来，这个人站立不稳时，
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_19"><span slot="default">小罗</span><template slot="alternate"><h4 class="tei-person tei-person3" id="PE0010"/><ul class="tei-person tei-person9" id="PE0010"/></template></pb-popover>
                闪在他背后，用枪顶住了，原来是
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_20"><span slot="default">余飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0005"><span class="tei-persName tei-persName9">余飞</span></h1><ul class="tei-person tei-person9" id="PE0005"/></template></pb-popover>
                。
            </p>
            <p class="tei-p tei-p1">
                </p></div></div></div></main><nav class="after-top"><ul><li><a class="aside-toggle" title="Hide" data-toggle=".after"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-bar-left" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M12.5 15a.5.5 0 0 1-.5-.5v-13a.5.5 0 0 1 1 0v13a.5.5 0 0 1-.5.5M10 8a.5.5 0 0 1-.5.5H3.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L3.707 7.5H9.5a.5.5 0 0 1 .5.5"/></svg></a></li></ul></nav><aside class="after"><div class="tab-panel"><span class="tab-title" data-title="Register">Register</span><div class="register-panel"><div class="register" id="exist-1.9.2.108.58"><h3>People</h3><ul><li class="tei-person tei-person2" id="PE0005"><a href="/shouchaoben/people/PE0005" class="persName"><pb-popover><span slot="default">余飞</span><template slot="alternate"/></pb-popover></a></li><li class="tei-person tei-person2" id="PE0035"/><li class="tei-person tei-person2" id="PE0010"/></ul><h3>Places</h3><ul><li class="tei-place tei-place2" id="P0009"><pb-geolocation event="mouseover" longitude="" latitude="" label="云南" auto="auto" wait-for="pb-leaflet-map" zoom="11" emit="map"><a href="/shouchaoben/places/P0009" class="placeName context"><pb-popover><span slot="default">云南</span><template slot="alternate"/></pb-popover></a></pb-geolocation></li><li class="tei-place tei-place2" id="P0011"><pb-geolocation event="mouseover" longitude="" latitude="" label="" auto="auto" wait-for="pb-leaflet-map" zoom="11" emit="map"/></li></ul></div></div></div><pb-leaflet-map id="map" zoom="11" subscribe="map"><pb-map-layer show="" base="" label="OpenTopo Map" url="https://{s}.tile.openstreetmap.de/tiles/osmde/{z}/{x}/{y}.png" max-zoom="19" attribution="© &lt;a href=&#34;https://www.openstreetmap.org/copyright&#34;&gt;OpenStreetMap&lt;/a&gt; contributors"/></pb-leaflet-map><div class="tab-panel"><span class="tab-title" data-title="Metadata">Metadata</span><div class="metadat             <div><h3><pb-i18n key="odd.sources"/></h3><ul>
                <li class="tei-msDesc tei-msDesc1">
                    
                        Lena Henningsen private collection
                    
                    
                        Manuscript fiction from the Chinese Cultural Revolution. The text indicates that it is the first volume in a collection of anti-espionage fiction stories. The titles of the other stories in the series are provided on the back cover: The tall grey building (灰色的大楼), The skin of the twelfth beauty (第十二张美人皮), The green corpse (绿色的尸体) and The plum blossom map (一副梅花图).
                        
                            <li class="tei-bibl tei-bibl1">

                            <p class="tei-p tei-p3">15 pages of thin note paper, rebound on the left hand side into a single squire, measuring 19,5 times 26,5 cm.</p>
                            <p class="tei-p tei-p3">Pages 1-14 are margined and ruled throughout with page numbers starting after  the title page until page 14. Page 15 is blank paper.</p>
                            <p class="tei-p tei-p3">Front and  back cover pages are of slightly thicker paper quality and blank.</p>
                            <p class="tei-p tei-p3">Single hand throughout.</p>
                            <p class="tei-p tei-p3">Text written only on front sides of the pages throughout, except back cover page: text on front and reverse side.</p>
                            <p class="tei-p tei-p3">Pages 1-14 written in black ink, page 15, front and back cover in blue ink.</p>
