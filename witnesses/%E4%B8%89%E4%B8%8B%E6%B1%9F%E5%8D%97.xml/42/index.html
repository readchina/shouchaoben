a></li></ul></nav></aside></div></li></ul></nav></div></header><nav class="before-top"><ul/><ul><li><a class="aside-toggle" title="Hide" data-toggle=".before"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-bar-left" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M12.5 15a.5.5 0 0 1-.5-.5v-13a.5.5 0 0 1 1 0v13a.5.5 0 0 1-.5.5M10 8a.5.5 0 0 1-.5.5H3.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L3.707 7.5H9.5a.5.5 0 0 1 .5.5"/></svg></a></li></ul></nav><aside class="before"/><header class="content-top"><nav class="toolbar"><ul/><ul><li><span role="group" class="light"><a href="../41/index.html" title="Page 41"><svg xmlns="http://www.w3.org/2000/svg" class="ionicon" viewBox="0 0 512 512"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="48" d="M328 112L184 256l144 144"/></svg></a><a href="../43/index.html" title="Page 43"><svg xmlns="http://www.w3.org/2000/svg" class="ionicon" viewBox="0 0 512 512"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="48" d="M184 112l144 144-144 144"/></svg></a></span></li></ul></nav></header><main><!-- Content block --><div class="center witness-layout"><pb-facsimile id="facsimile" base-uri="../../../" default-zoom-level="0" type="image" show-navigation-control="show-navigation-control" show-navigator="show-navigator" subscribe="transcription"/><div class="witness-transcription"><div class="tei-body tei-body2" id="exist-1.9.2.40.120"><p class="tei-p tei-p1"><pb-facs-link class="tei-pb tei-pb1" emit="transcription" facs="TTJ/wit/f/img/TTJ_f_00042.jpg">42</pb-facs-link>
                变（弯）就看不见了，看他把绳子挂好，大伙向下看，两具尸体，一挺已被炸坏的机枪。
            </p>
            <p class="tei-p tei-p1">
                在白房子里他们也搜出了大量的通讯器材，录音机、窃听器，看来不少东西转移了，还搜出了一份01-2型发报机性能说明书，这
                <pb-popover class="alternate tei-choice tei-choice1" id="altref_1"><span slot="default"><span class="tei-corr tei-corr1">种</span></span><template slot="alternate"><span class="tei-sic tei-sic1">中</span></template></pb-popover>
                发报机型号，
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_2"><span slot="default">叶</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0006"><span class="tei-persName tei-persName9">叶飞</span></h1><ul class="tei-person tei-person9" id="PE0006"/></template></pb-popover>
                、<pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_3"><span slot="default">李</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0013"><span class="tei-persName tei-persName9">李贵</span></h1><ul class="tei-person tei-person9" id="PE0013"/></template></pb-popover>均未见过。可能是敌人试制的，缴获的大量资料中，没有这种有这种发报机，也许水陆两用汽车带走了，估计这个据奌（
                <span class="tei-time tei-time1">kurzzeichen点</span>
                ）正在撤退，许司令听完汇报，亲自表扬了全体执行任务的同志们，接着又给
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_4"><span slot="default">叶飞</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0006"><span class="tei-persName tei-persName9">叶飞</span></h1><ul class="tei-person tei-person9" id="PE0006"/></template></pb-popover>
                下达了新的任务和重要指示。
            </p>
            <p class="tei-p tei-p1">《三下江南》 </p>
            <p class="tei-p tei-p1">
                <pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_5"><span slot="default">江南</span><template slot="alternate"><p class="tei-place tei-place5" id="P0024"/><ul class="tei-place tei-place6 links" id="P0024"/></template></pb-popover>
                <span class="tei-date tei-date3">九月</span>
                艳阳，贵山骄阳似火，中上时分，树叶都晒得萎
                <pb-popover class="alternate tei-choice tei-choice1" id="altref_6"><span slot="default"><span class="tei-corr tei-corr1">缩</span></span><template slot="alternate"><span class="tei-sic tei-sic1">宿</span></template></pb-popover>
                了，知了拉着长声叫个不停，给火热的天气增加了更多的麻烦，一个一修得很新的围墙大院，背着阳光的权抓监视这个院子，在院里的一间房子里，
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_7"><span slot="default">张延年</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0011"><span class="tei-persName tei-persName9">张延年</span></h1><ul class="tei-person tei-person9" id="PE0011"/></template></pb-popover>
                正在
                <pb-popover class="alternate tei-choice tei-choice1" id="altref_8"><span slot="default"><span class="tei-corr tei-corr1">理</span></span><template slot="alternate"><span class="tei-sic tei-sic1">里</span></template></pb-popover>
                内（第                        43页）务，他撕下一张日历，已是
                <span class="tei-date tei-date3">一九七一年九月十二日</span>
                ，他不由得叹了口气，唉，时间真快，转眼就是一年了。
            </p>
            <p class="tei-p tei-p1">
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_9"><span slot="default">张延年</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0011"><span class="tei-persName tei-persName9">张延年</span></h1><ul class="tei-person tei-person9" id="PE0011"/></template></pb-popover>
                是
                <span class="tei-date tei-date3">去年</span>
                高中毕业的学生，本应该下乡插队。可他娇生
                <pb-popover class="alternate tei-choice tei-choice1" id="altref_10"><span slot="default"><span class="tei-corr tei-corr1">惯</span></span><template slot="alternate"><span class="tei-sic tei-sic1">贯</span></template></pb-popover>
                养，又不愿到艰苦的地方去锻炼自己，父亲是个老工人，母亲是个慈祥的老太太，老俩（两）口苦口婆心劝他，他却说：“我身体很好，象牛一样，不用锻炼。”“你真应该改造思想”，父亲几乎每天
                <span class="tei-time tei-time1">晚上</span>
                都要争吵一番，他每天都要从家里留（
                Korrektur溜
                ）出来，到大街上闲走，消磨时间，后来他在
                <pb-popover class="alternate tei-placeName tei-placeName10 placeName context" id="altref_11"><span slot="default">上海咖啡馆</span><template slot="alternate"><p class="tei-place tei-place5" id="P0005"/><ul class="tei-place tei-place6 links" id="P0005"/></template></pb-popover>
                找到了消磨时间的地方，每天人来人往，川流不息，坐无空席，顾客谈坐声扯南
                <pb-popover class="alternate tei-choice tei-choice1" id="altref_12"><span slot="default"><span class="tei-corr tei-corr1">道</span></span><template slot="alternate"><span class="tei-sic tei-sic1">到</span></template></pb-popover>
                北，只有他熟（愁）眉不展，独坐一人旁，一                        天
                <span class="tei-time tei-time1">晚上</span>
                正是九奌（
                <span class="tei-time tei-time1">kurzzeichen点</span>
                ）钟，人们渐渐去了，而他独坐在那里，这时走来一个服务员，是活泼美丽的姑娘，问他是否再来一杯，就团（闲）谈起来，姑娘问他叫什么，他说叫
                <pb-popover class="alternate tei-persName tei-persName11 persName context" id="altref_13"><span slot="default">张延年</span><template slot="alternate"><h1 class="tei-person tei-person3" id="PE0011"><span class="tei-persName tei-persName9">张延年</span></h1><ul class="tei-person tei-person9" id="PE0011"/></template></pb-popover>
                ，又问他每天都来喝咖啡吗，为什么不高兴。他回答：“告诉你也没有用。”
                </p></div></div></div></main><nav class="after-top"><ul><li><a class="aside-toggle" title="Hide" data-toggle=".after"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-bar-left" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M12.5 15a.5.5 0 0 1-.5-.5v-13a.5.5 0 0 1 1 0v13a.5.5 0 0 1-.5.5M10 8a.5.5 0 0 1-.5.5H3.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L3.707 7.5H9.5a.5.5 0 0 1 .5.5"/></svg></a></li></ul></nav><aside class="after"><div class="tab-panel"><span class="tab-title" data-title="Register">Register</span><div class="register-panel"><div class="register" id="exist-1.9.2.40.120"><h3>People</h3><ul><li class="tei-person tei-person2" id="PE0006"><a href="/shouchaoben/people/PE0006" class="persName"><pb-popover><span slot="default">叶飞</span><template slot="alternate"/></pb-popover></a></li><li class="tei-person tei-person2" id="PE0013"><a href="/shouchaoben/people/PE0013" class="persName"><pb-popover><span slot="default">李贵</span><template slot="alternate"/></pb-popover></a></li><li class="tei-person tei-person2" id="PE0011"><a href="/shouchaoben/people/PE0011" class="persName"><pb-popover><span slot="default">张延年</span><template slot="alternate"/></pb-popover></a></li></ul><h3>Places</h3><ul><li class="tei-place tei-place2" id="P0024"><pb-geolocation event="mouseover" longitude="" latitude="" label="" auto="auto" wait-for="pb-leaflet-map" zoom="11" emit="map"/></li><li class="tei-place tei-place2" id="P0005"><pb-geolocation event="mouseover" longitude="" latitude="" label="" auto="auto" wait-for="pb-leaflet-map" zoom="11" emit="map"/></li></ul></div></div></div><pb-leaflet-map id="map" zoom="11" subscribe="map"><pb-map-layer show="" base="" label="OpenTopo Map" url="https://{s}.tile.openstreetmap.de/tiles/osmde/{z}/{x}/{y}.png" max-zoom="19" attribution="© &lt;a href=&#34;https://www.openstreetmap.org/copyright&#34;&gt;OpenStreetMap&lt;/a&gt; contributor             <div><h3><pb-i18n key="odd.sources"/></h3><ul>
                <li class="tei-msDesc tei-msDesc1">
                    
                        Lena Henningsen private collection
                    
                    
                        Manuscript fiction from the Chinese Cultural Revolution. 
                            The text provides no paratexts allowing for clues about its relation to other witnesses. 
                            There are, however, five rather similar witnesses of this text in our collection.
                        
                            <li class="tei-bibl tei-bibl1">
                                <div class="tei-author tei-author1">Anonymous</div>
                                <div class="tei-title tei-title2">三下江南</div>
                                <span class="tei-placeName tei-placeName11">no place</span>
                                <span class="tei-date tei-date3">no date</span>
                            </li>
                        
                    
                    
                        
                            <p class="tei-p tei-p3">51 pages of thin note paper, rebound on the top into a single squire, measuring 19,5 times 26,5 cm. 
                                All pages carry the header <span class="tei-foreign tei-foreign1" dir="ltr" lang="zh-Hant">材料紙</span> printed in red, marking it as note paper from a work unit.
                                Pages are margined and ruled with 14 lines per page. Page numbers at the bottom right corner of the pages added into the preprinted space.
                                Single hand throughout</p>
