class="center-l row two-column"><h1>Shouchaoben</h1><div class="hero-text"><p class="tei-p tei-p3">Unofficial Handwritten Entertainment Fiction from the Chinese Cultural Revolution: A Digital Edition</p><p class="tei-p tei-p3">Lena Henningsen</p><ul class="tei-list tei-list1 buttons">
               <li class="tei-item tei-item1"><a href="browse.html" class="tei-ref tei-ref1 button-link" target="_self"><pb-i18n key="menu.Explore the edition">Explore the edition</pb-i18n></a></li>
            </ul></div></div></header><nav class="before-top"><ul/><ul><li><a class="aside-toggle" title="Hide" data-toggle=".before"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-bar-left" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M12.5 15a.5.5 0 0 1-.5-.5v-13a.5.5 0 0 1 1 0v13a.5.5 0 0 1-.5.5M10 8a.5.5 0 0 1-.5.5H3.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L3.707 7.5H9.5a.5.5 0 0 1 .5.5"/></svg></a></li></ul></nav><aside class="before"/><header class="content-top"/><section id="about"><div class="center-l about-two-col"><span class="label">About</span><div class="row two-column about-columns"><div class="about-main"><header><h2 class="tei-head tei-head5">About this edition</h2></header><p class="tei-p tei-p3">During the Chinese Cultural Revolution (conventionally dated 1966–1976) the publishing industry came to a standstill. Resources were allocated only for the publication of officially sanctioned material, most prominently the “Little Red Book” containing quotations of Chairman Mao. Entertainment fiction did not count among this as it was considered poisonous for readers and therefore branded counterrevolutionary. While the country was endlessly reciting from the “Little Red Book”, many experienced the era as a cultural desert, or as a book famine. However, not everyone wanted to submit to the intellectual suffering of a cultural desert or a book famine. So throughout the country, clandestine intellectual and literary activities took place, including literary salons, as well as the writing, reading, copying, and circulating of underground poetry and unofficial handwritten entertainment fiction (<span class="tei-foreign tei-foreign1" dir="ltr" lang="zh-Hans">手抄本文学</span>
               <span class="tei-hi tei-hi2 italic">shouchaoben wenxue</span>). The latter circulated, in particular, among the educated urban youth who were sent to the countryside from late 1968 onwards. Written mostly on thin notepaper, these “flying books” traveled the country in multiple copies and were re-written into multiple, often differing versions. On this webpage, we present a critical digital edition of three manuscript witnesses of one of these stories, known in variations as <span class="tei-hi tei-hi2 italic">Three Times to Nanjing</span> and <span class="tei-hi tei-hi2 italic">Three Journeys to Jiangnan</span>.</p></div><div class="about-biblio"><h2 class="tei-head tei-head5">About this genre:</h2><ul class="tei-list tei-list2">
               <li class="tei-item tei-item6">
                  Bei, Dao [Zhao Zhenkai] 1990: <span class="tei-title tei-title7">Waves: Stories</span> (transl. by Bonnie S. McDougall and Susette Ternent Cooke, edited by Bonnie S. McDougall), New York: New Directions.
               </li>
               <li class="tei-item tei-item6">
                  Henningsen, Lena 2017: “What Is a Reader? Participation and Intertextuality in Hand-Copied Entertainment Fiction from the Chinese Cultural Revolution”, in: <span class="tei-title tei-title7">Modern Chinese Literature and Culture</span>, Vol. 29 no. 2 (fall 2017), 109–158.
               </li>
               <li class="tei-item tei-item6">
                  Henningsen, Lena 2019: “Literature of the Cultural Revolution”, in: Gu, Ming Dong [ed.]: <span class="tei-title tei-title7">Routledge Handbook of Modern Chinese Literature</span>, Oxon: Routledge, 423–434.
               </li>

                  Henningsen, Lena 2019: “Handwritten Entertainment Fiction (手抄本)”, in: <span class="tei-title tei-title7">The Mao Era in Objects</span>, <a href="https://maoeraobjects.ac.uk/object-biographies/handwritten-entertainment-fiction-%E6%89%8B%E6%8A%84%E6%9C%AC/" class="tei-ref tei-ref3" target="">https://maoeraobjects.ac.uk/object-biographies/handwritten-entertainment-fiction-手抄本/</a>, 2019, last access 2022-03-15.

               </li>
            </ul></div></div></div></section><section id="highlights" class="section-highlight"><header class="center-l row"><h2 class="tei-head tei-head5">Explore</h2></header><div class="highlights center-l"><article class="highlight-card area-1" style="background-image: var(--lg), url('/shouchaoben/resources/images/landing/P1020841.JPG');"><span class="label label-dark">Manuscripts</span><div class="desc"><h3><a href="browse.html" class="tei-ref tei-ref2" target="_self">Manuscript witnesses</a></h3><p>Critical edition of three handwritten witnesses of <span class="tei-hi tei-hi2 italic">Three Times to Nanjing</span> / <span class="tei-hi tei-hi2 italic">Three Journeys to Jiangnan</span>, with transcriptions and facsimile images.</p><ul class="tei-list tei-list1 buttons">

                  </ul></div></article><article class="highlight-card area-2" style="background-image: var(--lg), url('/shouchaoben/resources/images/landing/P1020840.JPG');"><span class="label label-dark">People</span><div class="desc"><h3><a href="people" class="tei-ref tei-ref2" target="_self">People register</a></h3><p>Named persons in the corpus — agents, officials, and historical figures referenced across the three witnesses.</p><ul class="tei-list tei-list1 buttons">
                     <li class="tei-item tei-item1"><a href="people" class="tei-ref tei-ref1 button-link" target="_self"><pb-i18n key="menu.People">People</pb-i18n></a></li>
                  </ul></div></article><article class="highlight-card area-3" style="background-image: var(--lg), url('/shouchaoben/resources/images/landing/P1020841.JPG');"><span class="label label-dark">Places</span><div class="desc"><h3><a href="places" class="tei-ref tei-ref2" target="_self">Places register</a></h3><p>Geographical names and locations in the Nanjing and Jiangnan plot traditions.</p><ul class="tei-list tei-list1 buttons">
                     <li class="tei-item tei-item1"><a href="places" class="tei-ref tei-ref1 button-link" target="_self"><pb-i18n key="menu.Places">Places</pb-i18n></a></li>
                  </ul></div></article></div></section><section id="team" class="section-light"><div class="center-l"><span class="label">Team</span><header class="row"><!-- horizontal alignment by default change by adding class="header-left" --><h1 class="tei-head tei-head8">This project was undertaken by:</h1></header><div class="team-members"><div class="member-card "><div class="member-card--top"><div class="no-label"/></div><div class="member-card--middle"><header><h3 class="member-name"><span class="tei-persName tei-persName9">Lena Henningsen</span></h3><p class="title"><span class="tei-occupation tei-occupation2">PI and contents</span></p></header><div class="contact-links"><a class="email" href=""/></div></div><div class="member-card--description"/></div><div class="member-card "><div class="member-card--top"><div class="no-label"/></div><div class="member-card--middle"><header><h3 class="member-name"><span class="tei-persName tei-persName9">Duncan Paterson</span></h3><p class="title"><span class="tei-occupation tei-occupation2">concept</span></p></header><div class="contact-links"><a class="email" href=""/></div></div><div class="member-card--description"/></div><div class="member-card "><div class="member-card--top"><div class="no-label"/></div><div class="member-card--middle"><header><h3 class="member-name"><span class="tei-persName tei-persName9">Qin Gu</span></h3><p class="title"><span class="tei-occupation tei-occupation2">programming</span></p></header><div class="contact-links"><a class="email" href=""/></div></div><div class="member-card--description"/></div><div class="member-card "><div class="member-card--top"><div class="no-label"/></div><div class="member-card--middle"><header><h3 class="member-name"><span class="tei-persName tei-persName9">Xiayin Dang</span></h3><p class="title"><span class="tei-occupation tei-occupation2">transcriptions</span></p></header><div class="contact-links"><a class="email" href=""/></div></div><div class="member-card--description"/></div></div></div></section><section class="section-dark"><div class="center-l section-single"><span class="label">Comparison</span><div class="section-content"><h2 class="tei-head tei-head5">Three Times to Nanjing / Three Journeys to Jiangnan</h2><p class="tei-p tei-p3"><span class="tei-hi tei-hi2 italic">Three Times to Nanjing</span> / <span class="tei-hi tei-hi2 italic">Three Journeys to Jiangnan</span> are variations on a spy story detailing the (alleged) background of the Lin Biao affair. While there exist numerous copies of the <span class="tei-hi tei-hi2 italic">Three Journeys to Jiangnan</span> version, with only minor differences across them, manuscripts of <span class="tei-hi tei-hi2 italic">Three Times to Nanjing</span> differ more substantially—including aesthetically rendered title pages and postscripts chronicling when and where they were copied. The plot summaries below contrast the two principal plot traditions represented in our three manuscript witnesses.</p><table class="tei-table tei-table1">
               <tr class="tei-row tei-row2">
                  <td class="tei-cell tei-cell1"><span class="tei-hi tei-hi2 bold">Three Journeys to Jiangnan</span></td>
                  <td class="tei-cell tei-cell1"><span class="tei-hi tei-hi2 bold">Three Times to Nanjing</span></td>
               </tr>
               <tr class="tei-row tei-row2">
                  <td class="tei-cell tei-cell1">The main part of the story takes place in Nanjing, in the days preceding the Lin Biao affair of September 13, 1971. A long prologue (making up about a fourth of the text) to the story relates a mysterious incident on Nanjing Bridge over the Changjiang, which took place, as the reader will later learn, a year before. As a group of researchers from Albania visit the bridge, a car passes by, and, subsequently, one of the men's watches stops working. As this is presumably the work of enemy spies, the incident is reported to the higher authorities in Beijing. Agent 3 is dispatched, but vanishes, and so does his successor, Agent 5. Before leaving, Agent 5 recommends Ye Fei <span class="tei-foreign tei-foreign1" dir="ltr" lang="zh-Hans">叶飞</span> as a potential successor to this mission, so Ye Fei is called to the capital and then sent to Nanjing. On the train journey the enemy unsuccessfully tries to assassinate him.</td>
                  <td class="tei-cell tei-cell1">This story also begins with the incident on the bridge. However, it is explicitly dated spring 1970 (February 8), and the researcher's watch resumes working soon after. This reminds the officers of an earlier mysterious event, an attempted assassination of the Cambodian Prince Sihanouk during his visit to the bridge. Following a report to Beijing, Agent 5 (Chen Zhanxiang <span class="tei-foreign tei-foreign1" dir="ltr" lang="zh-Hans">陈占祥</span>) is sent to Nanjing, but disappears soon after. Before leaving, he has recommended Yu Fei <span class="tei-foreign tei-foreign1" dir="ltr" lang="zh-Hans">余飞</span> as a potential successor to this mission, so Yu Fei is called to the capital and then sent to Nanjing. (On his trip to Beijing the enemy tries to assassinate him, but he escapes.)</td>
               </tr>
               <tr class="tei-row tei-row2">
                  <td class="tei-cell tei-cell1">The first trip to Jiangnan: whilst investigating the disappearance of his colleagues, Ye Fei survives two attempts by the enemy to poison him. He flees the enemy, hides in a coffin in a morgue and returns to Beijing by plane to report.</td>
                  <td class="tei-cell tei-cell1">The first trip to Nanjing: Yu Fei travels to Nanjing via Hohhot. The enemy makes one unsuccessful attempt to poison him, then decides to monitor him. Yu uses a microrecorder (a precious high-tech device produced in West Germany, of which only four exist in China) to collect evidence against the enemy and reports on this after his return to Beijing.</td>
               </tr>
               <tr class="tei-row tei-row2">
                  <td class="tei-cell tei-cell1">The second trip to Jiangnan: during this trip Ye Fei receives assistance from Xu Shiyou <span class="tei-foreign tei-foreign1" dir="ltr" lang="zh-Hans">许世友</span>, an older colleague. A mysterious house in a forest turns out to be inhabited by the spies. Ye Fei enters, discovers Agent 5, and saves him. The house is subsequently thoroughly inspected. Again, the adventure ends with Ye's return to Beijing and his report.</td>
                  <td class="tei-cell tei-cell1">The second trip to Nanjing: Yu Fei is sent to investigate the suicide of the young woman involved in the poison attack and the surveillance. Yu finds a mysterious house in the forest area in the vicinity of the Sun Yat-sen mausoleum (Zhongshanling area). This turns out to be inhabited by the spies. Yu Fei enters, discovers Chen Zhanxiang and saves him. Again, the adventure ends with Yu's return to Beijing and his report.</td>
               </tr>
               <tr class="tei-row tei-row2">
                  <td class="tei-cell tei-cell1">The third trip to Jiangnan: this chapter turns the focus on Zhang Yannian <span class="tei-foreign tei-foreign1" dir="ltr" lang="zh-Hans">张延年</span> and his experiences during the past year. Having refused the order to go down to the countryside, Zhang Yannian has spent most of his time drifting around town, spending much of his time in a café. There, he is tricked into joining what later turns out to be a fake liberation army that plans an assault on both Nanjing Bridge and on Mao Zedong (who is expected to be on a train crossing the bridge). Thanks to Zhang's mistrust and courageousness, the assassination is prevented. Ye Fei returns to Beijing for another report, and the episode ends with a remark about the Lin Biao affair, thus linking the fictional plot to a real-life event.</td>
                  <td class="tei-cell tei-cell1">The third trip to Nanjing: during an evening event Yu Fei spots Lin Liguo accompanied by a female spy. A trace leads to Wang Zhen <span class="tei-foreign tei-foreign1" dir="ltr" lang="zh-Hans">王贞</span>, who is arrested and then reports about his life during interrogation. Years before, fearing the hardship of being sent to the countryside, he became a hoodlum (<span class="tei-foreign tei-foreign1" dir="ltr" lang="zh-Hans">liumang</span>
                     <span class="tei-hi tei-hi2 italic">流氓</span>). After stealing from a canteen, he was tricked into joining what later turned out to be a fake liberation army. He was supposed to begin by assassinating his own parents, which, however, in the end did not happen, and then execute an attack on both Nanjing Bridge and Mao Zedong. Yu Fei returns to Beijing to report.</td>
               </tr>
               <tr class="tei-row tei-row2">
                  <td class="tei-cell tei-cell1">The story then ends with a brief epilogue narrating an episode some days before when two officers observed Mrs. Bai – one of the spies – in the company of Lin Liguo <span class="tei-foreign tei-foreign1" dir="ltr" lang="zh-Hans">林立果</span>, the son of Lin Biao.</td>
                  <td class="tei-cell tei-cell1">A brief paragraph links the story to the Lin Biao affair and with this it ends the story.<br class="tei-lb tei-lb3 lb"/>Source: Henningsen 2021</td>
               </tr>
            </table><p class="tei-p tei-p3">For a more detailed comparison of the manuscript witnesses, please consult the digital edition provided on this page, or see my earlier analysis (Henningsen 2021, 79–91). For a detailed discussion of the digital edition, see also (Henningsen and Paterson 2023).</p></div></div></section><section id="project-partners" class="section-light"><div class="center-l"><span class="label">Contact</span><header class="center-l row"><h1 class="tei-head tei-head8">Contact</h1><p class="tei-p tei-p3">READCHINA — University of Freiburg</p></header><div class="center-l row"><ul class="tei-list tei-list2">
               <li class="tei-item tei-item6">
